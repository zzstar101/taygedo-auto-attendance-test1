<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Actions setup guide</title>
  <desc id="desc">Static diagram showing Fork, Actions, and enable workflow steps.</desc>
  <rect width="960" height="520" fill="#f6f7f4"/>
  <rect x="70" y="64" width="820" height="392" rx="8" fill="#fff" stroke="#d9ded8"/>
  <text x="110" y="122" fill="#17211b" font-family="Arial, sans-serif" font-size="30" font-weight="700">1. Fork 并启用 Actions</text>
  <text x="110" y="164" fill="#647067" font-family="Arial, sans-serif" font-size="18">把仓库复制到自己的账号，然后打开 Actions 页面确认启用 workflow。</text>
  <rect x="120" y="215" width="210" height="84" rx="8" fill="#eef7f4" stroke="#9cc8bd"/>
  <text x="174" y="266" fill="#0f5b4b" font-family="Arial, sans-serif" font-size="23" font-weight="700">Fork</text>
  <path d="M350 257h96" stroke="#16735f" stroke-width="5" stroke-linecap="round"/>
  <path d="M432 241l18 16-18 16" fill="none" stroke="#16735f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="470" y="215" width="210" height="84" rx="8" fill="#eef7f4" stroke="#9cc8bd"/>
  <text x="531" y="266" fill="#0f5b4b" font-family="Arial, sans-serif" font-size="23" font-weight="700">Actions</text>
  <path d="M700 257h76" stroke="#16735f" stroke-width="5" stroke-linecap="round"/>
  <path d="M762 241l18 16-18 16" fill="none" stroke="#16735f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="120" y="340" width="720" height="54" rx="8" fill="#17211b"/>
  <text x="150" y="374" fill="#fff" font-family="Arial, sans-serif" font-size="20">Enable workflows 后再配置 Secrets 和运行登录 workflow</text>
</svg>
