<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Secrets setup guide</title>
  <desc id="desc">Static diagram showing repository secrets required by the workflow.</desc>
  <rect width="960" height="520" fill="#f6f7f4"/>
  <rect x="70" y="64" width="820" height="392" rx="8" fill="#fff" stroke="#d9ded8"/>
  <text x="110" y="122" fill="#17211b" font-family="Arial, sans-serif" font-size="30" font-weight="700">2. 添加 Repository Secrets</text>
  <text x="110" y="164" fill="#647067" font-family="Arial, sans-serif" font-size="18">Settings → Secrets and variables → Actions → New repository secret</text>
  <rect x="120" y="210" width="720" height="58" rx="8" fill="#eef7f4" stroke="#9cc8bd"/>
  <text x="150" y="247" fill="#0f5b4b" font-family="Arial, sans-serif" font-size="21" font-weight="700">GH_SECRET_UPDATE_TOKEN</text>
  <text x="485" y="247" fill="#647067" font-family="Arial, sans-serif" font-size="18">PAT，Secrets: Read and write</text>
  <rect x="120" y="286" width="720" height="58" rx="8" fill="#f8faf8" stroke="#d9ded8"/>
  <text x="150" y="323" fill="#17211b" font-family="Arial, sans-serif" font-size="21" font-weight="700">TAYGEDO_LOGIN_PASSWORD</text>
  <text x="485" y="323" fill="#647067" font-family="Arial, sans-serif" font-size="18">首次密码登录使用</text>
  <rect x="120" y="362" width="720" height="58" rx="8" fill="#f8faf8" stroke="#d9ded8"/>
  <text x="150" y="399" fill="#17211b" font-family="Arial, sans-serif" font-size="21" font-weight="700">TAYGEDO_CREDENTIAL_KEY</text>
  <text x="485" y="399" fill="#647067" font-family="Arial, sans-serif" font-size="18">加密保存密码，可由登录 workflow 生成</text>
</svg>
